<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieBox — Trending Movies & Shows</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23e50914'><path d='M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z'/></svg>" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f0f0f;
            color: #f5f5f5;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #141414 0%, #1a1a2e 100%);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid #2a2a3a;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #e50914, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        header h1 span {
            -webkit-text-fill-color: #f5f5f5;
            background: none;
            color: #f5f5f5;
            font-weight: 300;
        }

        .search-box {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 480px;
            min-width: 200px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1e1e2a;
            color: #f5f5f5;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .search-box input:focus {
            border-color: #e50914;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: #e50914;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .search-box button:hover {
            background: #ff0a1f;
            transform: scale(1.03);
        }

        /* Filter Buttons */
        .filters {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            flex-wrap: wrap;
            background: #141414;
            border-bottom: 1px solid #1f1f2a;
        }

        .filters button {
            padding: 7px 18px;
            border-radius: 20px;
            border: 1px solid #333;
            background: transparent;
            color: #aaa;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filters button:hover {
            border-color: #e50914;
            color: #f5f5f5;
        }

        .filters button.active {
            background: #e50914;
            border-color: #e50914;
            color: white;
        }

        /* Grid */
        .grid-container {
            padding: 20px 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Card */
        .card {
            background: #1a1a2a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            border: 1px solid #252535;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(229, 9, 20, 0.2);
            border-color: #e50914;
        }

        .card-img {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            background: #252535;
            display: block;
        }

        .card-body {
            padding: 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #888;
        }

        .card-meta .imdb {
            color: #f5c518;
            font-weight: 600;
        }

        .card-meta .year {
            color: #666;
        }

        .card-genre {
            font-size: 11px;
            color: #777;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Badge */
        .badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-movie {
            background: #e50914;
            color: white;
        }

        .badge-tv {
            background: #2d7d9a;
            color: white;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #666;
            font-size: 16px;
        }

        .loading::after {
            content: '';
            display: block;
            width: 36px;
            height: 36px;
            margin: 16px auto 0;
            border: 3px solid #333;
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #1a1a2a;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #333;
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            background: none;
            border: none;
            color: #aaa;
            font-size: 28px;
            cursor: pointer;
            padding: 12px 16px;
            z-index: 1;
            transition: color 0.15s;
        }

        .modal-close:hover {
            color: white;
        }

        .modal-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
        }

        .modal-body {
            padding: 20px 24px 28px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 14px;
        }

        .modal-info .imdb {
            color: #f5c518;
            font-weight: 600;
        }

        .modal-desc {
            font-size: 14px;
            line-height: 1.6;
            color: #bbb;
            margin-bottom: 18px;
        }

        .modal-btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            background: #e50914;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .modal-btn:hover {
            background: #ff0a1f;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 24px;
            color: #444;
            font-size: 12px;
            border-top: 1px solid #1a1a2a;
        }

        footer a {
            color: #e50914;
            text-decoration: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f0f0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header {
                padding: 14px 16px;
            }
            header h1 {
                font-size: 20px;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 14px;
            }
            .grid-container {
                padding: 14px 16px;
            }
            .filters {
                padding: 12px 16px;
            }
            .modal-body {
                padding: 16px 18px 22px;
            }
            .search-box input {
                font-size: 13px;
                padding: 8px 12px;
            }
            .search-box button {
                padding: 8px 14px;
                font-size: 13px;
            }
        }

        @media (max-width: 400px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Movie<span>Box</span></h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search movies & TV shows..." />
        <button id="searchBtn">Search</button>
    </div>
</header>

<div class="filters">
    <button class="active" data-filter="trending">🔥 Trending</button>
    <button data-filter="movies">🎬 Movies</button>
    <button data-filter="tv">📺 TV Shows</button>
</div>

<div class="grid-container">
    <div class="grid" id="grid"></div>
    <div class="loading" id="loading">Loading movies...</div>
</div>

<footer>
    Data powered by <a href="https://www.themoviedb.org" target="_blank">TMDB</a> via MovieBox API &middot;
    <a href="https://github.com" target="_blank">Hosted on GitHub Pages</a>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="modal-close" id="modalClose">&times;</button>
        <img class="modal-img" id="modalImg" src="" alt="" />
        <div class="modal-body">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-info" id="modalInfo"></div>
            <div class="modal-desc" id="modalDesc"></div>
            <a class="modal-btn" id="modalBtn" href="#" target="_blank">View Details</a>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'https://ab-movieapi.abrahamdw882.workers.dev';
    const PLATFORM_BASE = 'https://h5.aoneroom.com';

    const grid = document.getElementById('grid');
    const loading = document.getElementById('loading');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const filterBtns = document.querySelectorAll('.filters button');

    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const modalImg = document.getElementById('modalImg');
    const modalTitle = document.getElementById('modalTitle');
    const modalInfo = document.getElementById('modalInfo');
    const modalDesc = document.getElementById('modalDesc');
    const modalBtn = document.getElementById('modalBtn');

    let currentFilter = 'trending';
    let currentData = [];

    // --- Fetch ---
    async function fetchData(filter, query = '') {
        loading.style.display = 'block';
        grid.innerHTML = '';

        try {
            let url;

            if (query.trim()) {
                const encoded = encodeURIComponent(query.trim());
                url = `${API_BASE}/api/search/${encoded}?page=1&perPage=24&type=0`;
            } else if (filter === 'trending') {
                url = `${API_BASE}/api/trending?page=0&perPage=30`;
            } else if (filter === 'movies') {
                // Search popular movies via search with a broad term
                url = `${API_BASE}/api/search/a?page=1&perPage=30&type=1`;
            } else if (filter === 'tv') {
                url = `${API_BASE}/api/search/a?page=1&perPage=30&type=2`;
            }

            const res = await fetch(url);
            const json = await res.json();

            let items = [];

            if (json.data && json.data.subjectList) {
                // Trending endpoint
                items = json.data.subjectList;
            } else if (json.data && json.data.items) {
                // Search endpoint
                items = json.data.items;
            }

            currentData = items;
            renderGrid(items);
        } catch (err) {
            console.error('Fetch error:', err);
            grid.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#888;">
                Failed to load. The API may be rate-limited. Try again in a moment.
            </div>`;
        } finally {
            loading.style.display = 'none';
        }
    }

    // --- Render Grid ---
    function renderGrid(items) {
        if (!items || items.length === 0) {
            grid.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#888;">
                No results found.
            </div>`;
            return;
        }

        grid.innerHTML = items.map(item => {
            const coverUrl = item.cover?.url || '';
            const title = item.title || 'Untitled';
            const year = item.releaseDate ? item.releaseDate.slice(0, 4) : '';
            const imdb = item.imdbRatingValue || '';
            const genre = item.genre || '';
            const isMovie = item.subjectType === 1;
            const typeBadge = isMovie
                ? '<span class="badge badge-movie">Movie</span>'
                : '<span class="badge badge-tv">TV</span>';

            return `
                <div class="card" data-id="${item.subjectId || ''}">
                    <img class="card-img"
                         src="${coverUrl}"
                         alt="${title}"
                         loading="lazy"
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 2 3%22><rect fill=%22%23252535%22 width=%222%22 height=%223%22/></svg>'"
                    />
                    <div class="card-body">
                        <div class="card-title">${title}</div>
                        <div class="card-meta">
                            ${imdb ? `<span class="imdb">★ ${imdb}</span>` : ''}
                            ${year ? `<span class="year">${year}</span>` : ''}
                            ${typeBadge}
                        </div>
                        ${genre ? `<div class="card-genre">${genre}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        // Add click listeners
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                const id = card.dataset.id;
                const item = currentData.find(d => String(d.subjectId) === id);
                if (item) openModal(item);
            });
        });
    }

    // --- Modal ---
    async function openModal(item) {
        const coverUrl = item.cover?.url || '';
        const title = item.title || 'Untitled';
        const year = item.releaseDate ? item.releaseDate.slice(0, 4) : '';
        const imdb = item.imdbRatingValue || '';
        const genre = item.genre || '';
        const country = item.countryName || '';
        const desc = item.description || 'No description available.';
        const detailPath = item.detailPath || '';
        const detailUrl = detailPath ? `${PLATFORM_BASE}/detail/${detailPath}` : '#';

        modalImg.src = coverUrl;
        modalImg.alt = title;
        modalTitle.textContent = title;

        let infoParts = [];
        if (imdb) infoParts.push(`<span class="imdb">★ ${imdb}</span>`);
        if (year) infoParts.push(`<span>${year}</span>`);
        if (country) infoParts.push(`<span>${country}</span>`);
        if (genre) infoParts.push(`<span>${genre}</span>`);
        infoParts.push(item.subjectType === 1
            ? '<span class="badge badge-movie">Movie</span>'
            : '<span class="badge badge-tv">TV Series</span>');
        modalInfo.innerHTML = infoParts.join(' &middot; ');

        modalDesc.textContent = desc;
        modalBtn.href = detailUrl;

        modalOverlay.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modalOverlay.classList.remove('open');
        document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });

    // --- Filters ---
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            searchInput.value = '';
            fetchData(currentFilter);
        });
    });

    // --- Search ---
    function doSearch() {
        const query = searchInput.value.trim();
        if (!query) {
            fetchData(currentFilter);
            return;
        }
        filterBtns.forEach(b => b.classList.remove('active'));
        fetchData('search', query);
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doSearch();
    });

    // --- Init ---
    fetchData('trending');
</script>
</body>
</html>
